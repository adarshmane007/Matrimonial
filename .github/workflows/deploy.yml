name: Deploy Matrimonial Frontend to S3

on:
  workflow_dispatch:
    inputs:
      env:
        type: string
        description: "Deploy target key from .deploy/envs.json (e.g. production)"
        required: false
        default: production

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load environment config from JSON
        id: config
        env:
          INPUT_ENV: ${{ github.event.inputs.env }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [ ! -f ".deploy/envs.json" ]; then
            echo "Error: .deploy/envs.json not found"
            exit 1
          fi

          ENV="${INPUT_ENV:-}"
          if [ -z "$ENV" ]; then
            ENV=$(jq -r '.common.default_env // "production"' .deploy/envs.json)
          fi

          AWS_REGION=$(jq -r '.common.aws_region' .deploy/envs.json)
          S3_BUCKET_NAME=$(jq -r --arg env "$ENV" '.[$env].s3_bucket_name' .deploy/envs.json)
          CLOUDFRONT_DISTRIBUTION_ID=$(jq -r --arg env "$ENV" '.[$env].cloudfront_distribution_id // ""' .deploy/envs.json)
          API_URL=$(jq -r --arg env "$ENV" '.[$env].api_url' .deploy/envs.json)

          if [ "$S3_BUCKET_NAME" = "null" ] || [ -z "$S3_BUCKET_NAME" ]; then
            echo "Error: unknown env '$ENV' or missing s3_bucket_name in envs.json"
            exit 1
          fi

          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "Error: set GitHub secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY"
            exit 1
          fi

          VERSION="v$(date +%Y%m%d%H%M%S)-${GITHUB_SHA:0:7}"

          echo "ENV=${ENV}" >> "$GITHUB_OUTPUT"
          echo "AWS_REGION=${AWS_REGION}" >> "$GITHUB_OUTPUT"
          echo "S3_BUCKET_NAME=${S3_BUCKET_NAME}" >> "$GITHUB_OUTPUT"
          echo "CLOUDFRONT_DISTRIBUTION_ID=${CLOUDFRONT_DISTRIBUTION_ID}" >> "$GITHUB_OUTPUT"
          echo "API_URL=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci 2>/dev/null || npm install

      - name: Create build environment file
        run: |
          echo "VITE_API_URL=${{ steps.config.outputs.API_URL }}" > .env
          echo "Built with API_URL=${{ steps.config.outputs.API_URL }}"

      - name: Build frontend
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.config.outputs.AWS_REGION }}

      - name: Upload to S3 versioned folder
        id: upload
        run: |
          S3_BUCKET="${{ steps.config.outputs.S3_BUCKET_NAME }}"
          VERSION="${{ steps.config.outputs.VERSION }}"

          echo "Uploading to s3://${S3_BUCKET}/${VERSION}/"
          aws s3 sync dist/ "s3://${S3_BUCKET}/${VERSION}/" \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          aws s3 cp dist/index.html "s3://${S3_BUCKET}/${VERSION}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update latest pointer
        run: |
          S3_BUCKET="${{ steps.config.outputs.S3_BUCKET_NAME }}"
          VERSION="${{ steps.config.outputs.VERSION }}"

          aws s3 sync "s3://${S3_BUCKET}/${VERSION}/" "s3://${S3_BUCKET}/latest/" \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          aws s3 cp "s3://${S3_BUCKET}/${VERSION}/index.html" "s3://${S3_BUCKET}/latest/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

          echo "${VERSION}" | aws s3 cp - "s3://${S3_BUCKET}/.versions/current.txt"
          echo "$(date -u +'%Y-%m-%d %H:%M:%S UTC')|${VERSION}|${GITHUB_SHA}|${GITHUB_ACTOR}" | aws s3 cp - "s3://${S3_BUCKET}/.versions/history.txt"

      - name: Invalidate CloudFront cache
        if: steps.config.outputs.CLOUDFRONT_DISTRIBUTION_ID != '' && steps.config.outputs.CLOUDFRONT_DISTRIBUTION_ID != 'null'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.config.outputs.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/latest/*" \
            --no-cli-pager

      - name: Cleanup old versions (keep last 10)
        run: |
          S3_BUCKET="${{ steps.config.outputs.S3_BUCKET_NAME }}"
          aws s3 ls "s3://${S3_BUCKET}/" | grep -E "^PRE v[0-9]" | sort -r | tail -n +11 | awk '{print $2}' | while read -r version; do
            aws s3 rm "s3://${S3_BUCKET}/${version}" --recursive || true
          done

      - name: Deployment summary
        run: |
          {
            echo "## Matrimonial frontend deployed"
            echo "- **Env:** \`${{ steps.config.outputs.ENV }}\`"
            echo "- **Version:** \`${{ steps.upload.outputs.version }}\`"
            echo "- **Bucket:** \`${{ steps.config.outputs.S3_BUCKET_NAME }}\`"
            echo "- **API URL:** \`${{ steps.config.outputs.API_URL }}\`"
            echo "- **CloudFront:** \`${{ steps.config.outputs.CLOUDFRONT_DISTRIBUTION_ID }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
